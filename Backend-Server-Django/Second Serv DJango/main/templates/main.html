<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>Main File</title>
</head>
<style>
  body {
		background: whitesmoke;
		color: black;
		font-family: sans-serif;
		font-size: medium;
		font-style: initial;
		font-weight: bolder;
		padding: 0;
		margin: 0;
		max-width: 1920px;
		width: 100%;
		max-height: 1080px;
		height: 100%;
  }
	
	button {
		background: black;
		color: white;
		padding: 14px;
		margin: 7px;
		border: 1px solid dimgray;
		opacity: 1;
	}
	
	button:focus {
		background: white;
		color: black;
		border: 1px solid blue;
		opacity: 0.9;
	}
	
	button:hover {
		opacity: 0.8;
		border: 1px solid cyan;
		transform: translateY(5px);
	}
	
	button:active {
		opacity: 0.3;
		border: 1px solid cyan;
		transform: translateX(4px);
	}
</style>
<body>
  <div class="first_div">
    <p>Welcome to site, I created this site by Django framework and this is test site that haves the database and .html files</p>

    <button id="button_first" type="button" >Go to my next site</button>
  </div>
</body>
<script>
  const btn1 = document.getElementById("button_first");

  function goto_next_html(boolean) {
    if (boolean === "true") { 
      window.location.href = "file.html";
      console.log("LETSGOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOOO");
    } else {
      console.log("BIMBIMBAMBAM");
    }
  } 
  
  btn1.addEventListener("clicked", function () {
    goto_next_html("true");
  });

  document.addEventListener("keydown", function () {
    goto_next_html("true");
  });
</script>
</html>
