<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<style>
    body {
        background: whitesmoke;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-style: initial;
        font-weight: bolder;
        padding: 0;
        margin: 0;
        max-width: 1080px;
        width: 100%;
        max-height: 1920px;
        height: 100%;
        display: flex;
    }

    .logins {
        background: white;
        color: black;
        padding: 192px;
        margin: 108px;
        justify-content: center;
        justify-items: center;
        justify-self: center;
        text-align: center;
        align-content: center;
        align-items: center;
        align-self: center;
    }

    input {
        background: dimgrey;
        color: whitesmoke;
        padding: 12px;
        margin: 6px;
        border: 1px solid black;
    }

    input:focus {
        background: whitesmoke;
        color: dimgrey;
        border: 1px solid whitesmoke;
    }

    button {
        background: black;
        color: white;
        padding: 16px;
        margin: 8px;
        border: 1px solid ghostwhite;
    }

    button:focus {
        background: white;
        color: black;
        border: 1px solid dimgray;
        opacity: 0.7;
    }

    button:hover {
        opacity: 0.5;
        transform: translateY(4px);
    }

    button:active {
        opacity: 0.3;
        transform: translateX(5px);
    }
</style>
<body>
    <div class="logins">
        <input id="username" type="text" placeholder="Write username :" />
        <input id="password" type="password" placeholder="Write password :" />
        <button id="login" type="button">Login</button>
    </div>
</body>
<script>
    const uzer = document.getElementById("username");
    const pazz = document.getElementById("password");
    const logz = document.getElementById("login");

    logz.addEventListener("click", function () {
        if (uzer.value === "" || pazz.velue === "") {
            window.alert("ERROR!: Write usernzme and password!");
        } else {
            window.open("main.html")
        }
    })
</script>
</html>
